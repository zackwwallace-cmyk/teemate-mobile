workflows:
  ios-release:
    name: iOS Release IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.teemates.apps
      vars:
        XCODE_WORKSPACE: ios/TeeMate.xcworkspace
        XCODE_SCHEME: TeeMate
        APP_STORE_APP_ID: "6776049029"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate iOS project
        script: |
          npx expo prebuild --platform ios --clean
      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
